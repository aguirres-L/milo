# Static Site en Render: las variables VITE_* deben existir en el build (se inyectan en compile time).
# Completá los valores en el dashboard al crear el Blueprint o después en Environment.

services:
  - type: web
    name: milo-web
    runtime: static
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_DEV_USER_ID
        sync: false
